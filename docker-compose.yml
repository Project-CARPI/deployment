name: carpi-course-planner-deployment

# Reference remote git repositories directly by URL with #branch
include:
  - https://github.com/Project-CARPI/api.git#deployment-setup
  - https://github.com/Project-CARPI/site.git#main-preview
  - https://github.com/Project-CARPI/sis-scraper.git#deployment-setup

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - db
      - api
      - sis_scraper
